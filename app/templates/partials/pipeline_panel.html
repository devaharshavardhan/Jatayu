    <div class="stage-meta">

    </div>
  </div>
  <div class="stage arrow">→</div>
  <div class="stage">
    <div class="stage-title">Monitoring Agent</div>
    <div class="stage-meta">Alerts flowing</div>
  </div>
  <div class="stage arrow">→</div>
  <div class="stage">
    <div class="stage-title">Prediction Agent</div>
    <div class="stage-meta">Risks flowing</div>
  </div>
</div>
<div class="pipeline-meta">
  <div>Scenario: <span id="pipeline-scenario">-</span></div>
  <div>Run: <span id="pipeline-run">-</span></div>
  <div>Total published: <span id="pipeline-total">0</span></div>
  <div>Last publish time: <span id="pipeline-time">-</span></div>
